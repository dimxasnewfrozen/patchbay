name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # NSIS is required for wails build -nsis to produce the installer
      - name: Install NSIS
        run: choco install nsis --yes

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      # -nsis produces both patchbay.exe (portable) and
      # patchbay-amd64-installer.exe (NSIS installer)
      - name: Build
        run: wails build -nsis

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: build/bin/patchbay.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/bin/patchbay-amd64-installer.exe

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      # -arch universal produces a single binary for both Intel and Apple Silicon
      - name: Build
        run: wails build -arch universal

      # Wrap the .app bundle in a DMG for distribution
      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Patchbay" \
            -srcfolder build/bin/patchbay.app \
            -ov -format UDZO \
            build/bin/patchbay.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/bin/patchbay.dmg

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Wails on Linux requires GTK3 and WebKit2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build
        run: wails build

      # Bundle into a tarball for easy distribution
      - name: Package
        run: |
          cd build/bin
          tar -czf patchbay-linux-amd64.tar.gz patchbay

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: build/bin/patchbay-linux-amd64.tar.gz

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      # Tags like v1.0.0-beta.1 are marked as pre-release automatically
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            windows-portable/patchbay.exe
            windows-installer/patchbay-amd64-installer.exe
            macos-dmg/patchbay.dmg
            linux-tarball/patchbay-linux-amd64.tar.gz
